   "annotation_marker": "c",
   "annotation_type": "footnote",
   "annotation_text": "For Cycle 5 only, participants will return for additional sample collection at Days 3 and 5. Refer to Section 9.5.1 (Table 9.5.1-1) for all details, including allowed windows.",

    }

  },
  {
   "annotation_marker": "d",
   "annotation_type": "footnote",
   "annotation_text": "Samples can be collected ± 3 hours. If participants are dosed on a Thursday, Day 3 samples may be collected on Day 2. If dosed on a Friday, Day 3 sample can be collected on Day 4.",
   "marker_locations": [
    {
     "table_number": 2,
     "location_type": "schedule_property",
     "row_position": 2,

    }
   ]
  },
  {
   "annotation_marker": "e",
   "annotation_type": "footnote",
   "annotation_text": "For participants who require blood draw volume modifications, blood collection volumes will be reduced per guidelines outlined in the laboratory manual. Omitted blood collection will likely be for pharmacokinetic assessments, since all required safety assessments must be performed.",
   "marker_locations": [
    {

     "location_type": "activity_name",

    }

  },
  {
   "annotation_marker": "*",
   "annotation_type": "footnote",
   "annotation_text": "At Day 8 visits collect vital signs only.",
   "marker_locations": [

     "table_number": 2,

     "column_position": 5
    }

  {
   "annotation_marker": "n1",
   "annotation_type": "footnote",
   "annotation_text": "Vital signs (blood pressure, heart rate, and temperature), weight, Lansky play score for ≤ 16 years or Karnofsky performance score for > 16 years of age (Appendix 7). Monitor and record vital signs at predose and within 30 minutes after administration of nivolumab.",
   "marker_locations": [
    {
     "table_number": 2,
     "location_type": "activity_name",
     "row_position": 2
    }
   ]
  },
  {
   "annotation_marker": "n2",
   "annotation_type": "footnote",
   "annotation_text": "Pre-dose Day 1 of all cycles. Pre-PK blood draw on Cycle 1, Days 3, 5, and 8. Pre-PK blood draw on Cycle 5, Days 3 and 5. ECG should be performed within 30 minutes prior to PK blood draw. Participant should rest for 5 minutes prior to each ECG.",
   "marker_locations": [
    {
     "table_number": 2,
     "location_type": "activity_name",
     "row_position": 3
    }
   ]
  },
  {
   "annotation_marker": "n3",
   "annotation_type": "footnote",
   "annotation_text": "Adverse events (AEs) will be graded according to the National Cancer Institute Common Terminology Criteria for AEs (NCI-CTCAE) version 5. Record at each visit. All AEs (SAEs or non-serious AEs), including those associated with SARS-CoV-2 infection, must be collected continuously throughout the treatment period and for a minimum of 150 days after last dose of study treatment (Appendix 3).",
   "marker_locations": [
    {
     "table_number": 2,
     "location_type": "activity_name",
     "row_position": 4
    }
   ]
  },
  {
   "annotation_marker": "n4",
   "annotation_type": "footnote",
   "annotation_text": "Record at each visit.",
   "marker_locations": [
    {
     "table_number": 2,
     "location_type": "activity_name",
     "row_position": 5
    }
   ]
  },
  {
   "annotation_marker": "n5",
   "annotation_type": "footnote",
   "annotation_text": "Hematology and chemistry assessments scheduled for the day of study drugs dosing must be available and assessed before dosing. Hematology and chemistry assessments can be drawn within 72 hours prior to treatment, though renal function (ie, serum creatinine) must be assessed within 24 hours prior to dosing with bempegaldesleukin or as soon as locally feasible. Refer to Section 9.4.6 for a list of laboratory tests to conduct.",
   "marker_locations": [
    {
     "table_number": 2,
     "location_type": "activity_name",
     "row_position": 7
    }
   ]
  },
  {
   "annotation_marker": "n6",
   "annotation_type": "footnote",
   "annotation_text": "Serum or urine pregnancy test (minimum sensitivity units 25 IU/L or equivalent units of human chorionic gonadotropin) is required within 24 hours prior to treatment in women of childbearing potential.",
   "marker_locations": [

     "table_number": 2,
     "location_type": "activity_name",
     "row_position": 8
    }
   ]
  },
  {

   "annotation_text": "All study treatment decisions will be based on the investigator’s assessment of tumor images. See Section 9.1.1 for additional details and to Section 8.1.2 for tumor assessment associated with treatment beyond progression.",

   "annotation_text": "Except for glioma, medulloblastoma, ependymoma and other central nervous system tumors in which an MRI is required, CT of the brain (without and with contrast) can be performed if MRI is contraindicated. See Section 9.1.1 for further details.",

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    
    function renderJson(data, indent, isLast) {
        const comma = isLast ? '' : '<span class="json-comma">,</span>';
        if (data === null) return `<span class="json-null">null</span>${comma}`;
        if (typeof data === 'boolean') return `<span class="json-boolean">${data}</span>${comma}`;
        if (typeof data === 'number') return `<span class="json-number">${data}</span>${comma}`;
        if (typeof data === 'string') return `<span class="json-string">"${escHtml(data)}"</span>${comma}`;
        
        const isArray = Array.isArray(data);
        const entries = isArray ? data.map((v, i) => [i, v]) : Object.entries(data);
        const open = isArray ? '[' : '{';
        const close = isArray ? ']' : '}';
        
        if (entries.length === 0) {
            return `<span class="json-bracket">${open}${close}</span>${comma}`;
        }
        
        const id = 'n' + Math.random().toString(36).substr(2, 8);
        let html = `<span class="json-toggle" data-target="${id}" onclick="toggleNode(this)">`;
        html += `<span class="json-bracket">${open}</span></span>`;
        html += `<div class="json-content" id="${id}">`;
        
        entries.forEach(([key, val], i) => {
            const last = i === entries.length - 1;
            const keyHtml = isArray ? '' : `<span class="json-key">"${escHtml(key)}"</span>: `;
            html += `<div class="json-line">${keyHtml}${renderJson(val, indent + 1, last)}</div>`;
        });
        
        html += `</div><span class="json-ellipsis"> ${entries.length} items… </span>`;
        html += `<span class="json-bracket">${close}</span>${comma}`;
        return html;
    }
    
    function toggleNode(el) {
        el.classList.toggle('collapsed');
        const target = document.getElementById(el.dataset.target);
        target.classList.toggle('hidden');
    }
    
    // Render
    const container = document.getElementById('json-container');
    container.innerHTML = renderJson(jsonData, 0, true);
    
    // Stats
    const jsonStr = JSON.stringify(jsonData);
    const kb = (jsonStr.length / 1024).toFixed(1);
    document.getElementById('stats').textContent = `${kb} KB`;
    
    // Auto-collapse large arrays/objects at depth > 1
    document.querySelectorAll('.json-toggle').forEach(el => {
        const content = document.getElementById(el.dataset.target);
        if (content && content.children.length > 20) {
            el.classList.add('collapsed');
            content.classList.add('hidden');
        }
    });
    
    // Search
    const searchInput = document.getElementById('search');
    let searchTimeout;
    searchInput.addEventListener('input', function() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(doSearch, 200);
    });
    
    function doSearch() {
        const term = searchInput.value.trim().toLowerCase();
        const lines = container.querySelectorAll('.json-line');
        
        // Clear previous highlights
        container.querySelectorAll('.highlight').forEach(el => {
            el.outerHTML = el.textContent;
        });
        lines.forEach(l => l.classList.remove('search-no-match'));
        
        if (!term) return;
        
        // Expand all first
        container.querySelectorAll('.json-toggle.collapsed').forEach(el => {
            el.classList.remove('collapsed');
            document.getElementById(el.dataset.target).classList.remove('hidden');
        });
        
        lines.forEach(line => {
            const text = line.textContent.toLowerCase();
            if (text.includes(term)) {
                // Highlight matches in text nodes
                const walker = document.createTreeWalker(line, NodeFilter.SHOW_TEXT);
                const textNodes = [];
                while (walker.nextNode()) textNodes.push(walker.currentNode);
                textNodes.forEach(node => {
                    const idx = node.textContent.toLowerCase().indexOf(term);
                    if (idx >= 0) {
                        const span = document.createElement('span');
                        span.className = 'highlight';
                        const range = document.createRange();
                        range.setStart(node, idx);
                        range.setEnd(node, idx + term.length);
                        range.surroundContents(span);
                    }
                });
            } else {
                line.classList.add('search-no-match');
            }
        });
    }
    </script>
