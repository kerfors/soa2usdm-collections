 "annotations": [
  {
   "annotation_marker": "a",
   "annotation_type": "footnote",
   "annotation_text": "Short-term follow-up begins the day after the patient and the investigator agree that the patient will no longer continue study treatment and lasts approximately 30 days; the associated study procedures are performed once at the end of this period. Long-term follow-up begins the day after short-term follow-up is completed and continues until the patient’s death or overall study completion; the associated study procedures are performed approximately every 12 weeks (± 14 days) for the duration of this period.",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "schedule_cell",
     "row_position": 2,
     "column_position": 10
    },
    {
     "table_number": 1,
     "location_type": "schedule_cell",
     "row_position": 2,
     "column_position": 11
    }
   ]
  },
  {
   "annotation_marker": "b",
   "annotation_type": "footnote",
   "annotation_text": "For patients with inoperable locally advanced breast cancer, MRI scan of the breast is performed locally at baseline (Day -28 to Day -1), between Day 1 and Day 7 of every second cycle beginning with Cycle 3 and continuing through Cycle 13, between Day 1 and Day 7 of every third cycle after Cycle 13, and within 14 days of clinical progression. For all patients, CT or MRI scan of the chest, abdomen, and pelvis is performed locally at baseline (Day -28 to Day -1), between Day 1 and Day 7 of every second cycle beginning with Cycle 3 and continuing through Cycle 13, between Day 1 and Day 7 of every third cycle after Cycle 13, and within 14 days of clinical progression. It is recommended that CT imaging of the abdomen and pelvis be performed with IV contrast whenever possible. If this is not feasible due to hypersensitivity or other conditions, then gadolinium-enhanced MRI is preferred. For patients with known serious allergic reactions to CT contrast material, a CT of the chest without contrast and gadolinium-enhanced MRI of the abdomen/pelvis are encouraged. For patients who discontinue study treatment without objectively measured progressive disease (PD), continue to evaluate tumor response approximately every 8 weeks for the first 12 months following randomization and thereafter approximately every 12 weeks by the same method used at baseline and throughout the study until the patient has objective disease progression or until study completion. After the patient has objective disease progression, radiologic tests are no longer required and the patient will continue with post-discontinuation follow-up until the patient’s death or overall study completion.",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "activity_name",
     "row_position": 20
    }
   ]
  },
  {
   "annotation_marker": "c",
   "annotation_type": "footnote",
   "annotation_text": "Visible tumor (such as skin lesions) should be documented by photography and each photographic image of the tumor should include a ruler. For patients who discontinue study treatment without objectively measured progressive disease (PD), continue to evaluate tumor response approximately every 8 weeks for the first 12 months following randomization and thereafter approximately every 12 weeks by the same method used at baseline and throughout the study until the patient has objective disease progression or until study completion. After the patient has objective disease progression, tumor assessments are no longer required and the patient will continue with post-discontinuation follow-up until the patient’s death or overall study completion.",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "activity_name",
     "row_position": 19
    }
   ]
  },
  {
   "annotation_marker": "d",
   "annotation_type": "footnote",
   "annotation_text": "Survival information is collected at baseline and during both study treatment and postdiscontinuation follow-up. During Long-Term Follow-Up, survival information is collected approximately every 12 weeks for the duration of this period. Although preferable to collect during a clinic visit, survival information may be collected by contacting the patient or family directly (for example, via telephone). Long-Term Follow-up data collection may include anticancer therapies.",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "activity_name",
     "row_position": 23
    }
   ]
  },
  {
   "annotation_marker": "e",
   "annotation_type": "footnote",
   "annotation_text": "A local ECG (no replicates required) should be obtained at baseline (Day -14 to Day -1), 2 to 4 hours after the LY dose on Cycle 1 Day 1, upon arrival at site but prior to fulvestrant dose on Cycle 1 Day 15, 2 to 4 hours after the LY dose on Cycle 4 Day 1, and at the short-term follow-up visit.",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "activity_name",
     "row_position": 34
    }
   ]
  },
  {
   "annotation_marker": "f",
   "annotation_type": "footnote",
   "annotation_text": "Data on SAEs that occur before the end of trial will be stored in the collection database and the Lilly Safety System. During Long-Term Follow-Up, only SAEs that are related to study drugs or protocol procedures will be collected. All adverse events possibly related to study drugs or protocol procedures should be followed until they resolve, are no longer considered to be possibly related, become stable or return to baseline, the patient starts a new therapy, the patient expires, or the patient becomes lost to follow-up. The frequency of evaluation is determined according to the judgment of the investigator.",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "activity_name",
     "row_position": 24
    }
   ]
  },
  {
   "annotation_marker": "g",
   "annotation_type": "footnote",
   "annotation_text": "LY2835219 should be administered orally every 12 hours on Days 1 through 28 of each cycle; patients should not consume food beginning 1 hour before and ending 1 hour after taking LY2835219. Fulvestrant 500 mg should be administered intramuscularly into the buttocks slowly (1 to 2 minutes per injection) as two 250-mg injections, one in each buttock; however, for patients with moderate hepatic impairment (defined as Child-Pugh Class B), including any patient who develops moderate hepatic impairment during study treatment, fulvestrant 250 mg should be administered intramuscularly into the buttock slowly (1 to 2 minutes) as one 250-mg injection.",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "activity_name",
     "row_position": 37
    },
    {
     "table_number": 1,
     "location_type": "activity_name",
     "row_position": 38
    }
   ]
  },
  {
   "annotation_marker": "h",
   "annotation_type": "footnote",
   "annotation_text": "Formalin-fixed paraffin-embedded tumor tissue (either block or 15-20 unstained slides) should be requested at the time of randomization. However, if this sample is not available for a patient, it will not constitute a protocol deviation",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "activity_name",
     "row_position": 35
    }
   ]
  },
  {
   "annotation_marker": "i",
   "annotation_type": "footnote",
   "annotation_text": "Bone scintigraphy is performed locally at baseline (Day -28 to Day -1) for all patients. If available, prior bone scintigraphy (obtained as part of routine clinical care) within 45 days before Day 1 of Cycle 1 is also acceptable. Bone scintigraphy should be repeated for all patients between Day 1 and Day 7 of every sixth cycle beginning with Cycle 7, when complete response is identified in target disease, or when progression in bone is suspected. Importantly, RECIST v1.1 emphasizes that bone scintigraphy is not adequate to measure bone lesions; however, bone scintigraphy can be used to confirm the presence or disappearance of bone lesions. For patients who discontinue study treatment without objectively measured progressive disease (PD), continue to evaluate tumor response approximately every 6 months until the patient has objective disease progression or until study completion. After the patient has objective disease progression, bone scintigraphy is no longer required and the patient will continue with post-discontinuation follow-up until the patient’s death or overall study completion.",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "activity_name",
     "row_position": 21
    }
   ]
  },

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    
    function renderJson(data, indent, isLast) {
        const comma = isLast ? '' : '<span class="json-comma">,</span>';
        if (data === null) return `<span class="json-null">null</span>${comma}`;
        if (typeof data === 'boolean') return `<span class="json-boolean">${data}</span>${comma}`;
        if (typeof data === 'number') return `<span class="json-number">${data}</span>${comma}`;
        if (typeof data === 'string') return `<span class="json-string">"${escHtml(data)}"</span>${comma}`;
        
        const isArray = Array.isArray(data);
        const entries = isArray ? data.map((v, i) => [i, v]) : Object.entries(data);
        const open = isArray ? '[' : '{';
        const close = isArray ? ']' : '}';
        
        if (entries.length === 0) {
            return `<span class="json-bracket">${open}${close}</span>${comma}`;
        }
        
        const id = 'n' + Math.random().toString(36).substr(2, 8);
        let html = `<span class="json-toggle" data-target="${id}" onclick="toggleNode(this)">`;
        html += `<span class="json-bracket">${open}</span></span>`;
        html += `<div class="json-content" id="${id}">`;
        
        entries.forEach(([key, val], i) => {
            const last = i === entries.length - 1;
            const keyHtml = isArray ? '' : `<span class="json-key">"${escHtml(key)}"</span>: `;
            html += `<div class="json-line">${keyHtml}${renderJson(val, indent + 1, last)}</div>`;
        });
        
        html += `</div><span class="json-ellipsis"> ${entries.length} items… </span>`;
        html += `<span class="json-bracket">${close}</span>${comma}`;
        return html;
    }
    
    function toggleNode(el) {
        el.classList.toggle('collapsed');
        const target = document.getElementById(el.dataset.target);
        target.classList.toggle('hidden');
    }
    
    // Render
    const container = document.getElementById('json-container');
    container.innerHTML = renderJson(jsonData, 0, true);
    
    // Stats
    const jsonStr = JSON.stringify(jsonData);
    const kb = (jsonStr.length / 1024).toFixed(1);
    document.getElementById('stats').textContent = `${kb} KB`;
    
    // Auto-collapse large arrays/objects at depth > 1
    document.querySelectorAll('.json-toggle').forEach(el => {
        const content = document.getElementById(el.dataset.target);
        if (content && content.children.length > 20) {
            el.classList.add('collapsed');
            content.classList.add('hidden');
        }
    });
    
    // Search
    const searchInput = document.getElementById('search');
    let searchTimeout;
    searchInput.addEventListener('input', function() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(doSearch, 200);
    });
    
    function doSearch() {
        const term = searchInput.value.trim().toLowerCase();
        const lines = container.querySelectorAll('.json-line');
        
        // Clear previous highlights
        container.querySelectorAll('.highlight').forEach(el => {
            el.outerHTML = el.textContent;
        });
        lines.forEach(l => l.classList.remove('search-no-match'));
        
        if (!term) return;
        
        // Expand all first
        container.querySelectorAll('.json-toggle.collapsed').forEach(el => {
            el.classList.remove('collapsed');
            document.getElementById(el.dataset.target).classList.remove('hidden');
        });
        
        lines.forEach(line => {
            const text = line.textContent.toLowerCase();
            if (text.includes(term)) {
                // Highlight matches in text nodes
                const walker = document.createTreeWalker(line, NodeFilter.SHOW_TEXT);
                const textNodes = [];
                while (walker.nextNode()) textNodes.push(walker.currentNode);
                textNodes.forEach(node => {
                    const idx = node.textContent.toLowerCase().indexOf(term);
                    if (idx >= 0) {
                        const span = document.createElement('span');
                        span.className = 'highlight';
                        const range = document.createRange();
                        range.setStart(node, idx);
                        range.setEnd(node, idx + term.length);
                        range.surroundContents(span);
                    }
                });
            } else {
                line.classList.add('search-no-match');
            }
        });
    }
    </script>
