   "annotation_type": "footnote",
   "annotation_text": "If patients are discharged from hospital prior to Day 28, follow-up visits should occur twice weekly through Day 28. Patients are encouraged to return for onsite visits at least weekly if possible; other follow-up visits may be conducted by telephone or home visits. Patients should return to the site for a Day 28 visit.",

    }
   ]
  },
  {
   "annotation_marker": "b",
   "annotation_type": "footnote",
   "annotation_text": "All vital sign measurements (i.e., respiratory rate, pulse rate, systolic and diastolic blood pressures, and body temperature), oxygen saturation and NEWS2-specific assessments (i.e., consciousness and presence or absence of oxygen support) should be recorded together twice daily with approximately 12 hours in between while the patient remains hospitalized. If measured more than once during a 12-hour period, the worst values (highest temperature, respiratory rate, and heart rate; lowest blood pressure, oxygen saturation, and consciousness level) during that period should be recorded on the eCRF. Following hospital discharge these parameters should be recorded once at each return visit to the clinic. Vital signs and oxygen saturation will not be recorded if follow-up visits are conducted by telephone.",
   "marker_locations": [
    {
     "table_number": 2,
     "location_type": "activity_name",
     "row_position": 2
    },

     "table_number": 2,

  },
  {
   "annotation_marker": "c",

   "annotation_text": "If arterial blood gases are measured.",

  },
  {
   "annotation_marker": "d",
   "annotation_type": "footnote",
   "annotation_text": "Assessment of clinical status using the ordinal scale should be recorded at baseline on Day 1/Visit 1 then again daily every morning (between 8 am and 12 pm) for patients who remain hospitalized.",

   "annotation_text": "After informed consent has been obtained but prior to initiation of study drug, only serious adverse events caused by a protocol-mandated intervention should be reported. After initiation of study drug, all adverse events will be reported until 60 days after the final dose of study drug. After this period, the Sponsor should be notified if the investigator becomes aware of any serious adverse event that is believed to be related to prior study drug treatment (see Section 5.6).",

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    
    function renderJson(data, indent, isLast) {
        const comma = isLast ? '' : '<span class="json-comma">,</span>';
        if (data === null) return `<span class="json-null">null</span>${comma}`;
        if (typeof data === 'boolean') return `<span class="json-boolean">${data}</span>${comma}`;
        if (typeof data === 'number') return `<span class="json-number">${data}</span>${comma}`;
        if (typeof data === 'string') return `<span class="json-string">"${escHtml(data)}"</span>${comma}`;
        
        const isArray = Array.isArray(data);
        const entries = isArray ? data.map((v, i) => [i, v]) : Object.entries(data);
        const open = isArray ? '[' : '{';
        const close = isArray ? ']' : '}';
        
        if (entries.length === 0) {
            return `<span class="json-bracket">${open}${close}</span>${comma}`;
        }
        
        const id = 'n' + Math.random().toString(36).substr(2, 8);
        let html = `<span class="json-toggle" data-target="${id}" onclick="toggleNode(this)">`;
        html += `<span class="json-bracket">${open}</span></span>`;
        html += `<div class="json-content" id="${id}">`;
        
        entries.forEach(([key, val], i) => {
            const last = i === entries.length - 1;
            const keyHtml = isArray ? '' : `<span class="json-key">"${escHtml(key)}"</span>: `;
            html += `<div class="json-line">${keyHtml}${renderJson(val, indent + 1, last)}</div>`;
        });
        
        html += `</div><span class="json-ellipsis"> ${entries.length} items… </span>`;
        html += `<span class="json-bracket">${close}</span>${comma}`;
        return html;
    }
    
    function toggleNode(el) {
        el.classList.toggle('collapsed');
        const target = document.getElementById(el.dataset.target);
        target.classList.toggle('hidden');
    }
    
    // Render
    const container = document.getElementById('json-container');
    container.innerHTML = renderJson(jsonData, 0, true);
    
    // Stats
    const jsonStr = JSON.stringify(jsonData);
    const kb = (jsonStr.length / 1024).toFixed(1);
    document.getElementById('stats').textContent = `${kb} KB`;
    
    // Auto-collapse large arrays/objects at depth > 1
    document.querySelectorAll('.json-toggle').forEach(el => {
        const content = document.getElementById(el.dataset.target);
        if (content && content.children.length > 20) {
            el.classList.add('collapsed');
            content.classList.add('hidden');
        }
    });
    
    // Search
    const searchInput = document.getElementById('search');
    let searchTimeout;
    searchInput.addEventListener('input', function() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(doSearch, 200);
    });
    
    function doSearch() {
        const term = searchInput.value.trim().toLowerCase();
        const lines = container.querySelectorAll('.json-line');
        
        // Clear previous highlights
        container.querySelectorAll('.highlight').forEach(el => {
            el.outerHTML = el.textContent;
        });
        lines.forEach(l => l.classList.remove('search-no-match'));
        
        if (!term) return;
        
        // Expand all first
        container.querySelectorAll('.json-toggle.collapsed').forEach(el => {
            el.classList.remove('collapsed');
            document.getElementById(el.dataset.target).classList.remove('hidden');
        });
        
        lines.forEach(line => {
            const text = line.textContent.toLowerCase();
            if (text.includes(term)) {
                // Highlight matches in text nodes
                const walker = document.createTreeWalker(line, NodeFilter.SHOW_TEXT);
                const textNodes = [];
                while (walker.nextNode()) textNodes.push(walker.currentNode);
                textNodes.forEach(node => {
                    const idx = node.textContent.toLowerCase().indexOf(term);
                    if (idx >= 0) {
                        const span = document.createElement('span');
                        span.className = 'highlight';
                        const range = document.createRange();
                        range.setStart(node, idx);
                        range.setEnd(node, idx + term.length);
                        range.surroundContents(span);
                    }
                });
            } else {
                line.classList.add('search-no-match');
            }
        });
    }
    </script>
