  "annotations": [
    {
      "annotation_id": "annot-001",
      "table_id": "table-003",
      "annotation_marker": "a",
      "annotation_type": "footnote",
      "annotation_text": "With the exception of Cycle 1, all other study visits and assessments should be performed within ± 7 days of the scheduled date. If a patient receives capecitabine administered according to a 3-week cycle, timing of all study procedures and assessments scheduled according to 2-week treatment cycles (e.g. ECOG performance status) will be defined by the treatment cycles of concurrently administered bevacizumab (control arm) or the treatment cycles of concurrently administered bevacizumab and atezolizumab (experimental arm).",
      "annotation_scope": "column",
      "referenced_elements": {
        "property_ids": [],

        ],
        "activity_ids": [],
        "cell_references": []

    },
    {
      "annotation_id": "annot-002",
      "table_id": "table-003",
      "annotation_marker": "b",
      "annotation_type": "footnote",
      "annotation_text": "Patients who experience PD at any time during the Maintenance Treatment Phase, or who need to permanently discontinue study medication for any reason, will undergo a Study Treatment Discontinuation Visit within 30 days after the last dose of study medication. These patients will then enter the Post-Treatment Follow-up.",
      "annotation_scope": "column",
      "referenced_elements": {
        "property_ids": [],
        "column_ids": [
          "col-004"
        ],
        "activity_ids": [],
        "cell_references": []

      "marker_locations": [

        }
      ]
    },
    {
      "annotation_id": "annot-003",
      "table_id": "table-003",
      "annotation_marker": "c",
      "annotation_type": "footnote",
      "annotation_text": "After discontinuation of study treatment and the Study Treatment Discontinuation Visit, patients will enter the Post-Treatment Follow-up Phase. Beginning after the Study Treatment Discontinuation Visit, patients will be followed up every 3 months. Up to and including May 31, 2019, follow-up will include recording subsequent anti-cancer therapies, disease status (until progression as applicable), survival and safety evaluations. Patients who have completed the adverse event reporting period will be discontinued from the study at the post-treatment follow-up visit within the 3 months prior to and including May 31, 2019 (i.e. at the visit on/after March 1, 2019). After May 31, 2019, patients who have not yet completed the adverse event reporting period will be discontinued from the study after completion of the adverse event reporting period. Refer to Appendix 19 for the management of patients based on their study status as of May 31, 2019. Treatment during the Post-Treatment Follow-up Phase is at the Investigator’s discretion, however, patients treated with atezolizumab should not receive other immunomodulatory agents for 10 weeks after study treatment discontinuation. Patients who discontinue study treatment prior to disease progression will be followed for PFS, with disease status followed every 8 weeks until progression or May 31, 2019, whichever comes first.",
      "annotation_scope": "multiple",
      "referenced_elements": {
        "property_ids": [],
        "column_ids": [
          "col-005"
        ],
        "activity_ids": [
          "act-023",

    {
      "annotation_id": "annot-004",
      "table_id": "table-003",
      "annotation_marker": "d",
      "annotation_type": "footnote",
      "annotation_text": "Patients completing the Induction Treatment Phase, and who have not experienced PD can then proceed to the Maintenance Treatment Phase. Depending on the patient’s biomarker status (based on the archival sample from initial diagnosis), these patients will be assigned to a maintenance treatment cohort. Cohorts 2 and 4 are closed to further accrual. Patients with an adequate tumour sample but with unknown biomarker status due to lack of determinant result (e.g. due to technical issues) may still be included in the study depending on the addition of future cohorts.",
      "annotation_scope": "activity",
      "referenced_elements": {
        "property_ids": [],
        "column_ids": [],
        "activity_ids": [
          "act-001"

        "cell_references": []

    },
    {
      "annotation_id": "annot-005",
      "table_id": "table-003",
      "annotation_marker": "e",
      "annotation_type": "footnote",
      "annotation_text": "The cohort-specific exclusion criteria must be assessed prior to randomization to study maintenance treatment but assessment of cohort-specific eligibility can only be completed after the biomarker analysis results from the patient’s archival tumour tissue from initial diagnosis are known. Patients found ineligible for any cohort will undergo a Study Treatment Discontinuation Visit and enter the Post-Treatment Follow-up Phase.",
      "annotation_scope": "activity",
      "referenced_elements": {

    {

      "table_id": "table-003",
      "annotation_marker": "f",
      "annotation_type": "footnote",
      "annotation_text": "Each cohort will consist of an experimental treatment arm and a control arm. Randomised on a 2:1 (experimental:control) basis to either the experimental treatment arm or the control arm of that cohort. See Section 4.2.",

    {

      "table_id": "table-003",
      "annotation_marker": "g",
      "annotation_type": "footnote",
      "annotation_text": "Vital signs include measurements of systolic and diastolic blood pressure while the patient is in a seated position, and temperature. Experimental arm only: For the first atezolizumab infusion, the patient’s vital signs (heart rate, respiratory rate, blood pressures, and temperature) should be determined within 60 minutes before the infusion, every 15 ± 5 minutes during the infusion, and 30 ± 10 minutes after the infusion. For subsequent infusions, vital signs will be collected within 60 minutes before the infusion and should be collected during or after the infusion if clinically indicated or if symptoms occurred in the prior infusion. Vital sign measurements from every second treatment cycle only will be recorded in the CRF.",

    {

      "annotation_marker": "j",
      "annotation_type": "footnote",
      "annotation_text": "Concomitant medication includes any prescription medications or over-the-counter preparations used by a patient between the 7 days prior to the date of informed consent up until the Study Treatment Discontinuation visit. Only concomitant medications used for supportive care, to alleviate symptoms of mCRC, or to treat adverse drug reactions should be recorded on the Concomitant Medications eCRF. At subsequent visits, only changes to current medications or medications used since the last documentation of medications will be recorded. Concomitant medications for treatment of AEs related to study medication will continue to be recorded while the AE is being followed. For permitted and prohibited concomitant medications, see Section 4.4.",

    {
      "annotation_id": "annot-011",
      "table_id": "table-003",
      "annotation_marker": "k",
      "annotation_type": "footnote",
      "annotation_text": "Haematology includes haemoglobin, haematocrit, platelet count, red blood cell count, white blood cell count, and differential. Blood chemistry includes ALT, AST, alkaline phosphatase, total bilirubin, total protein, albumin, blood urea nitrogen or urea, LDH, creatinine, glucose, calcium, phosphorus, sodium, potassium, chloride, and bicarbonate. Hematology and blood chemistry tests must be conducted prior to each treatment cycle, with the results available for review prior to start of treatment according to local standards for treatment management. However, only tests conducted every second treatment cycle will be recorded in the eCRF. Clinical laboratory results constituting a clinically significant AE should be recorded as such.",

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    
    function renderJson(data, indent, isLast) {
        const comma = isLast ? '' : '<span class="json-comma">,</span>';
        if (data === null) return `<span class="json-null">null</span>${comma}`;
        if (typeof data === 'boolean') return `<span class="json-boolean">${data}</span>${comma}`;
        if (typeof data === 'number') return `<span class="json-number">${data}</span>${comma}`;
        if (typeof data === 'string') return `<span class="json-string">"${escHtml(data)}"</span>${comma}`;
        
        const isArray = Array.isArray(data);
        const entries = isArray ? data.map((v, i) => [i, v]) : Object.entries(data);
        const open = isArray ? '[' : '{';
        const close = isArray ? ']' : '}';
        
        if (entries.length === 0) {
            return `<span class="json-bracket">${open}${close}</span>${comma}`;
        }
        
        const id = 'n' + Math.random().toString(36).substr(2, 8);
        let html = `<span class="json-toggle" data-target="${id}" onclick="toggleNode(this)">`;
        html += `<span class="json-bracket">${open}</span></span>`;
        html += `<div class="json-content" id="${id}">`;
        
        entries.forEach(([key, val], i) => {
            const last = i === entries.length - 1;
            const keyHtml = isArray ? '' : `<span class="json-key">"${escHtml(key)}"</span>: `;
            html += `<div class="json-line">${keyHtml}${renderJson(val, indent + 1, last)}</div>`;
        });
        
        html += `</div><span class="json-ellipsis"> ${entries.length} items… </span>`;
        html += `<span class="json-bracket">${close}</span>${comma}`;
        return html;
    }
    
    function toggleNode(el) {
        el.classList.toggle('collapsed');
        const target = document.getElementById(el.dataset.target);
        target.classList.toggle('hidden');
    }
    
    // Render
    const container = document.getElementById('json-container');
    container.innerHTML = renderJson(jsonData, 0, true);
    
    // Stats
    const jsonStr = JSON.stringify(jsonData);
    const kb = (jsonStr.length / 1024).toFixed(1);
    document.getElementById('stats').textContent = `${kb} KB`;
    
    // Auto-collapse large arrays/objects at depth > 1
    document.querySelectorAll('.json-toggle').forEach(el => {
        const content = document.getElementById(el.dataset.target);
        if (content && content.children.length > 20) {
            el.classList.add('collapsed');
            content.classList.add('hidden');
        }
    });
    
    // Search
    const searchInput = document.getElementById('search');
    let searchTimeout;
    searchInput.addEventListener('input', function() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(doSearch, 200);
    });
    
    function doSearch() {
        const term = searchInput.value.trim().toLowerCase();
        const lines = container.querySelectorAll('.json-line');
        
        // Clear previous highlights
        container.querySelectorAll('.highlight').forEach(el => {
            el.outerHTML = el.textContent;
        });
        lines.forEach(l => l.classList.remove('search-no-match'));
        
        if (!term) return;
        
        // Expand all first
        container.querySelectorAll('.json-toggle.collapsed').forEach(el => {
            el.classList.remove('collapsed');
            document.getElementById(el.dataset.target).classList.remove('hidden');
        });
        
        lines.forEach(line => {
            const text = line.textContent.toLowerCase();
            if (text.includes(term)) {
                // Highlight matches in text nodes
                const walker = document.createTreeWalker(line, NodeFilter.SHOW_TEXT);
                const textNodes = [];
                while (walker.nextNode()) textNodes.push(walker.currentNode);
                textNodes.forEach(node => {
                    const idx = node.textContent.toLowerCase().indexOf(term);
                    if (idx >= 0) {
                        const span = document.createElement('span');
                        span.className = 'highlight';
                        const range = document.createRange();
                        range.setStart(node, idx);
                        range.setEnd(node, idx + term.length);
                        range.surroundContents(span);
                    }
                });
            } else {
                line.classList.add('search-no-match');
            }
        });
    }
    </script>
