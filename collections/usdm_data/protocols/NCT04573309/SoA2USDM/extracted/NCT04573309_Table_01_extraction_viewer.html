 "annotations": [
  {
   "annotation_marker": "a",
   "annotation_type": "footnote",
   "annotation_text": "Within 42 days of ALXN1840 administration. Details of procedures that may be performed by sites designated as “screening sites” (only in the US) are detailed in Section 8.",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "schedule_property",
     "row_position": 1,
     "column_position": 2
    }
   ]
  },
  {
   "annotation_marker": "b",
   "annotation_type": "footnote",
   "annotation_text": "Participants will be admitted to the clinical research unit (CRU) at least 10 hours prior to enrollment and initiation of copper- and molybdenum-controlled diet.",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "schedule_property",
     "row_position": 1,
     "column_position": 4
    }
   ]
  },
  {
   "annotation_marker": "c",
   "annotation_type": "footnote",
   "annotation_text": "At the CRU’s discretion, participants may remain in the CRU or be readmitted on Day 22 with all procedures starting on Day 23.",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "schedule_property",
     "row_position": 1,
     "column_position": 13
    }
   ]
  },
  {
   "annotation_marker": "d",
   "annotation_type": "footnote",
   "annotation_text": "Unscheduled study visits may occur at any time during the study and may include any study procedure as deemed necessary by the Investigator.",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "schedule_property",
     "row_position": 1,
     "column_position": 24
    }
   ]
  },
  {
   "annotation_marker": "e",
   "annotation_type": "footnote",
   "annotation_text": "Participants are required to return to the CRU Day 54+/-2; participants will be discontinued from ALXN1840 medication by their physician at the latest by the Day 54 follow-up.",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "schedule_property",
     "row_position": 1,
     "column_position": 25
    }
   ]
  },
  {
   "annotation_marker": "f",
   "annotation_type": "footnote",
   "annotation_text": "Discharge from the unit may occur after completion of all procedures on Day 9 and on Day 40 and after the Investigator has reviewed all safety assessment (including safety laboratory tests) and confirmed that the participant is appropriate for discharge.",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "activity_name",
     "row_position": 4
    }
   ]
  },
  {
   "annotation_marker": "g",
   "annotation_type": "footnote",
   "annotation_text": "A single outpatient visit or phone call and safety laboratory assessment should occur between Day 14 and Day 18. A phone call may take place on a different day than the blood draw within the Day 14 through Day 18 period.",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "schedule_cell",
     "row_position": 5,
     "column_position": 13
    },
    {
     "table_number": 1,
     "location_type": "schedule_cell",
     "row_position": 29,
     "column_position": 13
    },
    {
     "table_number": 1,
     "location_type": "schedule_cell",
     "row_position": 30,
     "column_position": 13
    }
   ]
  },
  {
   "annotation_marker": "h",
   "annotation_type": "footnote",
   "annotation_text": "If needed to confirm menopause.",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "activity_name",
     "row_position": 8
    }
   ]
  },
  {
   "annotation_marker": "i",
   "annotation_type": "footnote",
   "annotation_text": "Parameters include age and sex. Race and ethnicity will be collected where permitted by local regulations.",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "activity_name",
     "row_position": 13
    }
   ]
  },
  {
   "annotation_marker": "j",
   "annotation_type": "footnote",
   "annotation_text": "Wilson disease history will include diagnosis date, method of diagnosis, history of cirrhosis, details of any previous liver biopsies performed, and treatment received.",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "activity_name",
     "row_position": 14
    },
    {
     "table_number": 1,
     "location_type": "activity_name",
     "row_position": 15
    }
   ]
  },
  {
   "annotation_marker": "k",
   "annotation_type": "footnote",
   "annotation_text": "A full physical examination will be performed at Screening, at check-in for the study, and at the End of the study/Early Termination Visit. A physical examination should also be performed on any participants with ongoing adverse events prior to discharge from the unit. Otherwise, a symptom-driven physical examination may be performed at other times, at the Principal Investigator’s discretion.",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "activity_name",
     "row_position": 16
    }
   ]
  },
  {
   "annotation_marker": "l",
   "annotation_type": "footnote",
   "annotation_text": "Height at screening only.",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "activity_name",
     "row_position": 17
    }
   ]
  },
  {
   "annotation_marker": "m",
   "annotation_type": "footnote",
   "annotation_text": "While in the CRU, study intervention will be administered after an overnight fast (ie, at least 10 hours) at the same time every morning; drug is to be administered with 240 mL of water and meals should be delayed a minimum of 2 hours after dosing. As an outpatient, participants are expected to take ALXN1840 at approximately the same time daily (+/-1 hour). Participants should take the medication with a glass of water on an empty stomach; meals should be delayed a minimum of 2 hours after dosing.",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "activity_name",
     "row_position": 22
    }
   ]
  },
  {
   "annotation_marker": "n",
   "annotation_type": "footnote",
   "annotation_text": "During the outpatient period, participants will use SMS text messaging to confirm study intervention administration.",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "schedule_cell",
     "row_position": 25,
     "column_position": 13
    }
   ]
  },
  {
   "annotation_marker": "o",
   "annotation_type": "footnote",
   "annotation_text": "Blood sampling for PK/PD will occur before ALXN1840 administration and represents a predose trough. See Table 2 for PK/PD sampling on Days 1, 25, 29, and 39.",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "activity_name",
     "row_position": 26
    }
   ]
  },
  {
   "annotation_marker": "p",
   "annotation_type": "footnote",
   "annotation_text": "PK/PD collection will include timepoints described in the schedule of PK/PD assessment for Days 1, 25, 29, and 39 (Table 2).",
   "marker_locations": [
    {
     "table_number": 1,
     "location_type": "schedule_cell",
     "row_position": 27,

   "annotation_type": "footnote",
   "annotation_text": "Samples for serum chemistry will be obtained following a fast of at least 8 hours at the Screening Visit and at check-in. In case of rechecks, and postdose serum chemistry, participants may not have fasted for 6 or 8 hours before the serum chemistry sample is taken.",

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    
    function renderJson(data, indent, isLast) {
        const comma = isLast ? '' : '<span class="json-comma">,</span>';
        if (data === null) return `<span class="json-null">null</span>${comma}`;
        if (typeof data === 'boolean') return `<span class="json-boolean">${data}</span>${comma}`;
        if (typeof data === 'number') return `<span class="json-number">${data}</span>${comma}`;
        if (typeof data === 'string') return `<span class="json-string">"${escHtml(data)}"</span>${comma}`;
        
        const isArray = Array.isArray(data);
        const entries = isArray ? data.map((v, i) => [i, v]) : Object.entries(data);
        const open = isArray ? '[' : '{';
        const close = isArray ? ']' : '}';
        
        if (entries.length === 0) {
            return `<span class="json-bracket">${open}${close}</span>${comma}`;
        }
        
        const id = 'n' + Math.random().toString(36).substr(2, 8);
        let html = `<span class="json-toggle" data-target="${id}" onclick="toggleNode(this)">`;
        html += `<span class="json-bracket">${open}</span></span>`;
        html += `<div class="json-content" id="${id}">`;
        
        entries.forEach(([key, val], i) => {
            const last = i === entries.length - 1;
            const keyHtml = isArray ? '' : `<span class="json-key">"${escHtml(key)}"</span>: `;
            html += `<div class="json-line">${keyHtml}${renderJson(val, indent + 1, last)}</div>`;
        });
        
        html += `</div><span class="json-ellipsis"> ${entries.length} items… </span>`;
        html += `<span class="json-bracket">${close}</span>${comma}`;
        return html;
    }
    
    function toggleNode(el) {
        el.classList.toggle('collapsed');
        const target = document.getElementById(el.dataset.target);
        target.classList.toggle('hidden');
    }
    
    // Render
    const container = document.getElementById('json-container');
    container.innerHTML = renderJson(jsonData, 0, true);
    
    // Stats
    const jsonStr = JSON.stringify(jsonData);
    const kb = (jsonStr.length / 1024).toFixed(1);
    document.getElementById('stats').textContent = `${kb} KB`;
    
    // Auto-collapse large arrays/objects at depth > 1
    document.querySelectorAll('.json-toggle').forEach(el => {
        const content = document.getElementById(el.dataset.target);
        if (content && content.children.length > 20) {
            el.classList.add('collapsed');
            content.classList.add('hidden');
        }
    });
    
    // Search
    const searchInput = document.getElementById('search');
    let searchTimeout;
    searchInput.addEventListener('input', function() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(doSearch, 200);
    });
    
    function doSearch() {
        const term = searchInput.value.trim().toLowerCase();
        const lines = container.querySelectorAll('.json-line');
        
        // Clear previous highlights
        container.querySelectorAll('.highlight').forEach(el => {
            el.outerHTML = el.textContent;
        });
        lines.forEach(l => l.classList.remove('search-no-match'));
        
        if (!term) return;
        
        // Expand all first
        container.querySelectorAll('.json-toggle.collapsed').forEach(el => {
            el.classList.remove('collapsed');
            document.getElementById(el.dataset.target).classList.remove('hidden');
        });
        
        lines.forEach(line => {
            const text = line.textContent.toLowerCase();
            if (text.includes(term)) {
                // Highlight matches in text nodes
                const walker = document.createTreeWalker(line, NodeFilter.SHOW_TEXT);
                const textNodes = [];
                while (walker.nextNode()) textNodes.push(walker.currentNode);
                textNodes.forEach(node => {
                    const idx = node.textContent.toLowerCase().indexOf(term);
                    if (idx >= 0) {
                        const span = document.createElement('span');
                        span.className = 'highlight';
                        const range = document.createRange();
                        range.setStart(node, idx);
                        range.setEnd(node, idx + term.length);
                        range.surroundContents(span);
                    }
                });
            } else {
                line.classList.add('search-no-match');
            }
        });
    }
    </script>
